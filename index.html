<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.cdnfonts.com/css/ndot-57" rel="stylesheet">

<title>ManiCart</title>

<style>
body{
    margin:0;
    font-family: 'NDot-57', sans-serif;
    background: linear-gradient(135deg,#0f0f0f,#1a0000,#000);
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:5px;
}
header img{
    width:120px;
}

/* GRID (4 products) */
.container{
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:15px;
    padding:15px;
}

/* CARD */
.card{
    background: rgba(255,0,0,0.08);
    border-radius:15px;
    padding:10px;
    text-align:center;
}

/* IMAGE SLIDER */
.slider{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
}
.slider img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    scroll-snap-align:center;
}

/* BUTTON */
button{
    padding:10px;
    background: linear-gradient(45deg, red, black);
    border:none;
    color:white;
    border-radius:6px;
    margin-top:8px;
}

/* FORM */
#formBox{
    display:none;
    padding:20px;
    text-align:center;
}
input{
    width:90%;
    padding:10px;
    margin:5px;
    border:none;
    border-radius:6px;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    color:white;
}
</style>
</head>

<body>

<header>
    <img src="https://i.imgur.com/Z25ARUt.png">
</header>

<div class="container">

    <!-- PRODUCT 1 -->
    <div class="card">
        <div class="slider">
            <img src=" https://i.imgur.com/yOOvqwT.png">
            <img src=" https://i.imgur.com/n6ADjHE.png">
            <img src="https://i.imgur.com/9cXysTU.png">
        </div>
        <h3>Feel Weight T-shirt</h3>
        <p>₹499</p>
        <button onclick="orderNow('Feel Weight T-shirt ₹499')">Buy</button>

</div>

<!-- FORM -->
<div id="formBox">
    <h2>Enter Details</h2>

    <form action="https://formsubmit.co/pawarg7378@gmail.com" method="POST">
        <input type="hidden" name="Product" id="productField">

        <input type="text" name="Name" placeholder="Name" required>
        <input type="text" name="Phone" placeholder="Phone" required>
        <input type="text" name="Address" placeholder="Address" required>

        <button type="submit">Place Order</button>
    </form>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/919422051032" target="_blank">💬</a>

<script>
function orderNow(product){
    document.getElementById("formBox").style.display="block";
    document.getElementById("productField").value = product;
    window.scrollTo(0,document.body.scrollHeight);
}
</script>

</body>
</html>
